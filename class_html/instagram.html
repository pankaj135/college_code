            display: flex;
            align-items: center;
            justify-content: center;
        }

            border: 1px solid #dbdbdb;

            background-repeat: no-repeat;
            margin-bottom: 33px;
        }

        .login-form {
            width: 100%;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        .form-group input {
            width: 100%;
            padding: 9px 0 7px 8px;
            border: 1px solid #efefef;
            border-radius: 3px;
            background: #fafafa;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #a8a8a8;
            background: white;
        }

        .login-btn {
            width: 100%;
            background: #0095f6;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 7px 0;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background: #007bb5;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            width: 100%;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #efefef;
        }

        .divider span {
            padding: 0 16px;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
        }

        .facebook-login {
            color: #385185;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            margin-bottom: 23px;
            display: block;
            text-align: center;
        }

        .facebook-login:hover {
            text-decoration: underline;
        }

        .signup-link {
            color: #00376B;
            font-size: 14px;
            text-decoration: none;
            margin-top: 20px;
        }

        .signup-link:hover {
            text-decoration: underline;
        }

        .app-download {
            margin-top: 30px;
            display: flex;
            gap: 10px;
        }

        .app-download img {
            width: 120px;
            height: auto;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .app-download img:hover {
            opacity: 1;
        }

        @media (max-width: 450px) {
            .login-container {
                border: none;
                border-radius: 0;
                width: 100%;
                max-width: 350px;
                margin: 0 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container" style="background: linear-gradient(white, rgb(222, 172, 173),rgb(222, 172, 173), rgb(222, 172, 173),  rgb(222, 172, 173), rgb(222, 172, 173) );;">
        <div ><img src="image_b1addf07 (1).png" width="60px" height="50px" ></div>
        
        <form class="login-form">
            <div class="form-group">
                <input type="text" placeholder="Phone number, username, or email" autocomplete="username">
            </div>
            <div class="form-group">
                <input type="password" placeholder="Password" autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn">Log in</button>
        </form>

        <div class="divider">
            <span>OR</span>
        </div>

        <a href="#" class="facebook-login">Log in with Facebook</a>

        <a href="#" class="signup-link">Don't have an account? Sign up</a>

</html>
